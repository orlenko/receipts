<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf8f1"/>
      <stop offset="1" stop-color="#f5f1e8"/>
    </linearGradient>
  </defs>

  <!-- paper background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- wordmark dot + name (top-left) -->
  <circle cx="84" cy="92" r="11" fill="#0f5f5c"/>
  <circle cx="84" cy="92" r="17" fill="none" stroke="#0f5f5c" stroke-width="2" opacity="0.32"/>
  <text x="112" y="100" font-size="28" font-weight="600" fill="#1b1a17" letter-spacing="-0.5">receipts</text>

  <!-- headline -->
  <text x="80" y="280" font-size="68" font-weight="600" fill="#1b1a17" letter-spacing="-2">Photos of paper receipts, in.</text>
  <text x="80" y="364" font-size="68" font-weight="400" fill="#0f5f5c" letter-spacing="-1.5" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Upright scans + a tidy spreadsheet, out.</text>

  <!-- subline -->
  <text x="80" y="448" font-size="26" fill="#3c3a34" letter-spacing="-0.2">Free · bring your own OpenAI key · nothing leaves your browser</text>

  <!-- footer line -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#d9d2bf"/>
  <text x="80" y="580" font-size="22" fill="#6a665c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">receipts.clickable.one</text>
  <text x="1120" y="580" font-size="22" fill="#6a665c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="end">MIT · github.com/orlenko/receipts</text>

  <!-- decorative receipt on the right -->
  <g transform="translate(870, 130)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <path d="M0 0 h220 v330 l-22 18 l-22 -18 l-22 18 l-22 -18 l-22 18 l-22 -18 l-22 18 l-22 -18 l-22 18 l-22 -18 z" fill="#fff" stroke="#d9d2bf" stroke-width="1.5"/>
    <text x="110" y="46" font-size="16" font-weight="600" fill="#1b1a17" text-anchor="middle">RONA #605</text>
    <text x="110" y="68" font-size="12" fill="#6a665c" text-anchor="middle">Coquitlam, BC</text>
    <line x1="22" y1="92" x2="198" y2="92" stroke="#e8e2cf"/>
    <text x="22" y="124" font-size="14" fill="#3c3a34">SUBTOTAL</text>
    <text x="198" y="124" font-size="14" fill="#3c3a34" text-anchor="end">30.99</text>
    <text x="22" y="152" font-size="14" fill="#3c3a34">GST 5%</text>
    <text x="198" y="152" font-size="14" fill="#3c3a34" text-anchor="end">1.55</text>
    <text x="22" y="180" font-size="14" fill="#3c3a34">PST 7%</text>
    <text x="198" y="180" font-size="14" fill="#3c3a34" text-anchor="end">2.17</text>
    <line x1="22" y1="200" x2="198" y2="200" stroke="#e8e2cf"/>
    <text x="22" y="232" font-size="18" font-weight="700" fill="#1b1a17">TOTAL</text>
    <text x="198" y="232" font-size="18" font-weight="700" fill="#1b1a17" text-anchor="end">34.71</text>
    <text x="110" y="276" font-size="11" fill="#6a665c" text-anchor="middle">2026-03-14 · CAD · MasterCard</text>
  </g>
</svg>
